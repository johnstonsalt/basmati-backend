<!DOCTYPE html>
    <head>
        <title>BASMAAAATI BASMATI RICE</title>
        
        <style>
            body, html { padding: 0; margin: 0; background: whitesmoke; color: #404040; font-family: sans-serif; }
        </style>
    </head>

    <body>
        <br />
        <br />
        <div style="text-align: center; font-size: 2em;">
            <div>current IP is:</div>
            <div id="ipdiv" style="font-size: 2.7em; font-weight: bold;"></div>
            
            <br />

            <div id="countdiv">loading...</div>
            <div id="listdiv" style="font-size: 2em; font-weight: bold;"></div>
        </div>

        <script>
            async function doTheShit() {
                var ip = window.location.href.replace("http://", "").replace(":3000/", "");
                var ipdiv = document.querySelector("#ipdiv");
                ipdiv.innerText = ip;

                // mc data
                var mcres = await fetch(`/players`, { cache: "no-store" });
                var mcdata = await mcres.json();

                var countdiv = document.querySelector("#countdiv");
                var listdiv = document.querySelector("#listdiv");

                if (mcdata["error"]) {
                    countdiv.innerHTML = "<b style='color: #e03731;'>server is offline :(</b>";
                } else {
                    countdiv.innerText = `there are ${mcdata["players"]["online"]} players online:`;

                    var players = [];
                    listdiv.innerText = "";

                    for (var i = 0; i < mcdata["players"]["online"]; i++) {
                        var player = mcdata["players"]["sample"][i]["name"];
                        players.push(player);
                    }

                    players.sort();

                    for (var i = 0; i < players.length; i++) {
                        listdiv.innerText += players[i] + "\n";
                    }
                }
            }
   
            doTheShit();
        </script>
    </body>
</html>
