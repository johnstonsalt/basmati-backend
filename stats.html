<!DOCTYPE html>
    <head>
        <title>basmati stats</title>

        <link rel="stylesheet" href="/style.css" />    
    </head>
    <body>
        <br /> <br />
        <div style="width: 80%; margin: auto;">
            <div style="font-weight: bold; font-size: 2.7em; text-align: center;">stats</div>
        
        <br /> <br />
<form>
        <label>sort by:</label>
        <select id="sortform" onChange="sortChanged(this.form)" style="font-size: 0.8em;">
        </select>
</form>
        <br />
            <div id="stats" style="font-size: 0.9em;">loading...</div> 
        </div>

        <script>
            var sortkey = "username";
            var data;

            async function getStats() {
                var res = await fetch("/api/stats"); 
                data = await res.json();

                var sortform = document.querySelector("#sortform");

                var entries = Object.entries(data[0]);
                for (var i = 0; i < entries.length; i++) {
                    sortform.innerHTML += `<option value="${entries[i][0]}">${entries[i][0]}</option>`;
                }

                showStats();
            }

            // absolute cinema.
            function showStats() {
                var sorted = data;
                sorted.sort(function (a, b) { 
                    if (sortkey == "username") { return a[sortkey] > b[sortkey]; }
               
                    var na = Number(String(a[sortkey]).replace(" blocks", "").replace(" hours", "").replace(",", ""));
                    var nb = Number(String(b[sortkey]).replace(" blocks", "").replace(" hours", "").replace(",", ""));
                    return na < nb;
                });

                var statsel = document.querySelector("#stats");
                statsel.innerHTML = "";
                for (var i = 0; i < sorted.length; i++) {
                    var formatted = `
                    <div> 
                        <div style="font-weight: bold; font-size: 1.2em;">${sorted[i]["username"]}</div>`

                    var entries = Object.entries(sorted[i]);
    
                    for (var j = 1; j < entries.length; j++) {
                        if (entries[j][0] == sortkey)
                            formatted += `<div style="font-weight: bold;">${entries[j][0]}: ${entries[j][1]}</div>`;
                        else
                            formatted += `<div>${entries[j][0]}: ${entries[j][1]}</div>`;
                    }

                    formatted += `</div> <a href='/fullstats/${sorted[i]["username"]}' target='_blank'>view all stats...</a> <br /> <br />`;
                    statsel.innerHTML += formatted;
                }
            } 
           
            function sortChanged(el) {
                var sortform = document.querySelector("#sortform");
                sortkey = sortform.options[sortform.selectedIndex].value;
                console.log(sortkey); 

                showStats();
            } 

            getStats();
        </script>
    </body>
</html>
